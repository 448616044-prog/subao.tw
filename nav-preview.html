<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>導航預覽</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#0066CC;--primary-dark:#004C99;--primary-light:#E6F0FA;--secondary:#FF6600;--line-green:#00B900;--bg-white:#FFF;--text-dark:#333;--text-light:#666;--radius:8px;--transition:all 0.2s ease}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:#f0f2f5;min-height:100vh}

/* ====== NAV ====== */
.header{position:fixed;top:0;left:0;right:0;height:68px;background:var(--bg-white);z-index:1000;border-bottom:1px solid #e8ecf0;transition:box-shadow 0.3s}
.header.scrolled{box-shadow:0 2px 20px rgba(0,0,0,0.08)}
.header .container{max-width:1280px;margin:0 auto;padding:0 24px;height:100%;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:8px;font-size:20px;font-weight:700;color:var(--primary);text-decoration:none;white-space:nowrap}
.logo img{height:36px;width:auto}
.nav{display:flex;align-items:center;gap:4px}
.nav>a,.nav .dropdown>a{display:flex;align-items:center;padding:8px 14px;font-size:14.5px;font-weight:500;color:var(--text-dark);text-decoration:none;border-radius:6px;transition:var(--transition);white-space:nowrap;position:relative}
.nav>a:hover,.nav .dropdown:hover>a{background:var(--primary-light);color:var(--primary)}
.nav>a.active,.nav .dropdown>a.active{background:var(--primary);color:#fff}
.nav>a.active:hover{background:var(--primary-dark)}
.dropdown{position:relative}
.dropdown>a::after{content:'▾';font-size:10px;margin-left:4px}
.dropdown-menu{display:none;position:absolute;top:100%;left:0;min-width:180px;background:#fff;border-radius:8px;box-shadow:0 8px 30px rgba(0,0,0,0.12);padding:8px 0;z-index:100;margin-top:4px;border:1px solid #e8ecf0}
.dropdown:hover .dropdown-menu{display:block}
.dropdown-menu a{display:block;padding:10px 16px;font-size:14px;color:var(--text-dark);text-decoration:none;transition:var(--transition)}
.dropdown-menu a:hover{background:var(--primary-light);color:var(--primary)}
.dropdown-menu a.active{background:var(--primary-light);color:var(--primary);font-weight:600}
.header-cta{display:flex;align-items:center;gap:12px}
.btn-line{padding:10px 20px;background:var(--line-green);color:#fff;border-radius:6px;font-size:14px;font-weight:600;text-decoration:none;display:flex;align-items:center;gap:6px;transition:var(--transition);white-space:nowrap}
.btn-line:hover{background:#009900;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,185,0,0.25)}
.menu-toggle{display:none;background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-dark);padding:4px}

/* Mobile */
.mobile-menu{display:none;position:fixed;top:68px;left:0;right:0;bottom:0;background:#fff;padding:16px 24px;overflow-y:auto;z-index:999}
.mobile-menu.active{display:block}
.mobile-menu a,.mobile-menu .m-dropdown>span{display:block;padding:14px 8px;font-size:15px;font-weight:500;color:var(--text-dark);text-decoration:none;border-bottom:1px solid #f0f0f0}
.mobile-menu a.active,.mobile-menu .m-dropdown>span.active{color:var(--primary);font-weight:700}
.m-dropdown>span{cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.m-dropdown>span::after{content:'▾';font-size:12px;transition:transform 0.2s}
.m-dropdown.open>span::after{transform:rotate(180deg)}
.m-dropdown-links{display:none;padding-left:16px}
.m-dropdown.open .m-dropdown-links{display:block}
.m-dropdown-links a{font-size:14px;padding:10px 8px}
.mobile-cta{margin-top:16px;text-align:center}
.mobile-cta .btn-line{display:block;text-align:center;justify-content:center;padding:14px}

@media(max-width:992px){
  .nav,.header-cta{display:none}
  .menu-toggle{display:block}
}

/* ====== DEMO CONTENT ====== */
.demo{padding:120px 24px 40px;max-width:900px;margin:0 auto}
.demo h2{font-size:24px;margin-bottom:8px}
.demo p{color:var(--text-light);margin-bottom:20px;line-height:1.7}
.choice-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:32px 0}
.choice-card{padding:24px;border-radius:12px;border:2px solid #e8ecf0;cursor:pointer;transition:var(--transition);background:#fff}
.choice-card:hover{border-color:var(--primary);box-shadow:0 4px 16px rgba(0,102,204,0.1)}
.choice-card.selected{border-color:var(--primary);background:var(--primary-light)}
.choice-card h3{font-size:16px;margin-bottom:4px}
.choice-card p{font-size:13px;color:var(--text-light);margin:0}
</style>
</head>
<body>

<header class="header scrolled" id="header">
  <div class="container">
    <a href="/" class="logo">
      <img src="images/subao-logo-new.png" alt="速豹集運" onerror="this.style.display='none'">
      <span>速豹集運</span>
    </a>

    <nav class="nav" id="desktopNav">
      <a href="/tw-to-cn">台灣發大陸</a>

      <div class="dropdown">
        <a href="/pricing">運費</a>
        <div class="dropdown-menu">
          <a href="/pricing">💰 運費報價</a>
          <a href="/pricing-calculator">🧮 運費試算</a>
        </div>
      </div>

      <a href="/customs-guide">關稅速查</a>
      <a href="/article-list">文章攻略</a>
      <a href="/faq">常見問題</a>
      <a href="/partners">合作夥伴</a>
      <a href="/about">關於我們</a>
    </nav>

    <div class="header-cta">
      <a href="https://line.me/ti/p/~subaotw5988" class="btn-line" target="_blank" onclick="gtag('event','line_click',{event_category:'conversion',event_label:'line_consult',value:1})">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5.93 11.36c-.14.47-.48.87-.96 1.11l-3.68 1.84c-.42.21-.91.27-1.36.16-.47-.14-.87-.48-1.11-.96l-1.84-3.68c-.21-.42-.27-.91-.16-1.36.14-.47.48-.87.96-1.11l3.68-1.84c.42-.21.91-.27 1.36-.16.47.14.87.48 1.11.96l1.84 3.68c.21.42.27.91.16 1.36z"/></svg>
        LINE 咨詢
      </a>
    </div>

    <button class="menu-toggle" id="menuToggle">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>
</header>

<!-- Mobile menu -->
<div class="mobile-menu" id="mobileMenu">
  <a href="/tw-to-cn">台灣發大陸</a>
  <div class="m-dropdown">
    <span>運費</span>
    <div class="m-dropdown-links">
      <a href="/pricing">運費報價</a>
      <a href="/pricing-calculator">運費試算</a>
    </div>
  </div>
  <a href="/customs-guide">關稅速查</a>
  <a href="/article-list">文章攻略</a>
  <a href="/faq">常見問題</a>
  <a href="/partners">合作夥伴</a>
  <a href="/about">關於我們</a>
  <div class="mobile-cta">
    <a href="https://line.me/ti/p/~subaotw5988" class="btn-line" target="_blank" onclick="gtag('event','line_click',{event_category:'conversion',event_label:'line_consult',value:1})">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5.93 11.36c-.14.47-.48.87-.96 1.11l-3.68 1.84c-.42.21-.91.27-1.36.16-.47-.14-.87-.48-1.11-.96l-1.84-3.68c-.21-.42-.27-.91-.16-1.36.14-.47.48-.87.96-1.11l3.68-1.84c.42-.21.91-.27 1.36-.16.47.14.87.48 1.11.96l1.84 3.68c.21.42.27.91.16 1.36z"/></svg>
      LINE 咨詢
    </a>
  </div>
</div>

<div class="demo">
  <h2>🔄 新導航設計 — 預覽</h2>
  <p>9 個項目變 7 個主項目 + 1 個下拉。<strong>「運費報價」和「運費試算」</strong>收進「運費」下拉；<strong>LINE 聯繫</strong>只留在 CTA 按鈕裡（不放導航欄）。</p>

  <div class="choice-grid">
    <div class="choice-card">
      <h3>✅ 更簡潔</h3>
      <p>7 項 vs 9 項，視覺壓力減 30%</p>
    </div>
    <div class="choice-card">
      <h3>✅ 邏輯分組</h3>
      <p>報價 + 試算 → 運費下拉，語義自然</p>
    </div>
    <div class="choice-card">
      <h3>✅ SEO 加分</h3>
      <p>精簡主導航 → 每個鏈接權重更高</p>
    </div>
  </div>
</div>

<script>
// Scroll shadow
window.addEventListener('scroll',function(){document.getElementById('header').classList.toggle('scrolled',window.scrollY>50)});

// Mobile menu
var menuToggle=document.getElementById('menuToggle'),mobileMenu=document.getElementById('mobileMenu');
menuToggle.addEventListener('click',function(){mobileMenu.classList.toggle('active');var s=menuToggle.querySelector('svg');if(mobileMenu.classList.contains('active')){s.innerHTML='<line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/>'}else{s.innerHTML='<line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>'}});
mobileMenu.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){mobileMenu.classList.remove('active')})});

// Mobile dropdown
document.querySelectorAll('.m-dropdown>span').forEach(function(s){s.addEventListener('click',function(e){e.stopPropagation();this.parentElement.classList.toggle('open')})});
</script>
</body>
</html>
