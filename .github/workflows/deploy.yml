name: Deploy subaotw.cn to CVM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-cn:
    name: Deploy subaotw.cn → CVM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to CVM via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CVM_HOST }}
          username: ${{ secrets.CVM_USER }}
          key: ${{ secrets.CVM_SSH_KEY }}
          port: 22
          source: "sites/subaotw-cn/**"
          target: "/var/www/subaotw-cn/"
          strip_components: 2
          overwrite: true
