<h2>常见问题</h2>
<div class="faq-list">
    <div class="faq-item"><h3>商业大货出口台湾需要什么资质？</h3><p>出口方需要：1) 营业执照（经营范围含进出口）2) 海关备案登记 3) 电子口岸卡。如果没有进出口权，我们可以代理出口（双抬头报关），你只需要提供货物和装箱单。</p></div>
    <div class="faq-item"><h3>整柜运费包含哪些？</h3><p>整柜运费通常包含：海运费(Ocean Freight)、码头操作费(THC)、文件费(DOC)、封条费、报关费。不包含：台湾进口关税、台湾端送货费（可代付到付）、可能的查验费。建议签合同时问清楚是ALL IN还是分开计。</p></div>
    <div class="faq-item"><h3>FOB和CIF怎么选？</h3><p>FOB(离岸价)=我们负责大陆端报关+运到码头装船，台湾买家自己找船公司和清关。CIF(到岸价)=我们负责全程（大陆报关+海运+保险），台湾清关由买家负责。DDP(完税后交货)=我们负责全程含台湾清关税，直接送货到买家门口——最省心但费用最高。</p></div>
    <div class="faq-item"><h3>每月有稳定货量怎么谈价格？</h3><p>月发货量超过3个柜即可享受月结优惠价，20尺柜优惠800-1500元/柜。长期合作的签年度框架协议，锁定运价。还可以签保舱协议，旺季确保有柜。</p></div>
