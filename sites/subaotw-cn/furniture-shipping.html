      <h3>2. 熏蒸——实木家具必做</h3>
      <p>任何含<strong>未加工木材</strong>的家具出口台湾，必须进行熏蒸处理并取得熏蒸证书。这是台湾海关的强制要求，目的是防止木材害虫入境。已上漆/贴面的家具通常不需要熏蒸，但需提供材质证明。</p>

      <h3>3. 报关——选对HS编码</h3>
      <p>家具出口报关时，正确的HS编码（海关商品编码）非常重要。我们协助准备全套报关文件：商业发票、装箱单、熏蒸证书（如需）、原产地证明。</p>

      <h3>4. 台湾进口清关+缴税</h3>
      <p>家具进口台湾的关税约5-10%（视品类），另加5%营业税。新家具需提供大陆工厂发票，旧家具按折旧估价。个人搬家使用的旧家具可申请免税额度。</p>

<h2>常见问题</h2>
<div class="faq-list">
    <div class="faq-item"><h3>大陆家具可以海运到台湾吗？</h3><p>可以！大陆家具出口台湾是非常成熟的物流路线。实木家具、红木家具、定制家具、办公家具等均可海运。需要做好防潮防碰的包装处理，并完成出口报关和台湾进口清关手续。</p></div>
    <div class="faq-item"><h3>家具海运到台湾要多少钱？</h3><p>家具海运费用取决于体积：拼柜联系我们获取报价/立方，一套三居室家具（约8-12立方）总费用联系我们获取报价含打包、报关、海运、清关、送货。</p></div>
    <div class="faq-item"><h3>实木家具有什么特殊要求吗？</h3><p>实木家具海运台湾需要：1) 熏蒸处理（防止虫害）2) 提供树种证明 3) 木箱包装。熏蒸费用联系我们获取报价/批。未经熏蒸处理的实木制品可能被台湾海关退回或销毁。</p></div>
    <div class="faq-item"><h3>家具海运台湾需要多长时间？</h3><p>全程约15-20天：打包1-2天，熏蒸1天（如需），报关出口2天，海运5-7天，台湾清关3-5天，送货2-3天。</p></div>
    <div class="faq-item"><h3>定做家具怎么出口？</h3><p>定制家具出口流程：1) 工厂完成生产后，通知我们上门取货 2) 按尺寸定制木箱包装 3) 按新家具报关（需提供工厂发票）4) 海运+清关+送货。注意：实木定制需要熏蒸。</p></div>
