<h2>常见问题</h2>
<div class="faq-list">
    <div class="faq-item"><h3>大陆搬家到台湾和台湾搬回大陆哪个便宜？</h3><p>大陆→台湾搬家通常比台湾→大陆搬家费用稍高（约高10-15%），因为大陆出口报关手续比台湾出口复杂，大陆端打包人力成本低但台湾进口清关时间略长。总体差距不大。</p></div>
    <div class="faq-item"><h3>搬家费用包含哪些项目？</h3><p>完整搬家费用包括：① 打包费（材料+人工）② 报关费（大陆出口+台湾进口）③ 运费（海运/空运）④ 保险费（建议购买，货值1-3%）⑤ 台湾端送货费（含可能的搬上楼费）。不含：台湾进口关税（个人行李免税）。</p></div>
    <div class="faq-item"><h3>怎么省搬家费？</h3><p>5个省钱技巧：1) 自己打包部分物品（衣物/书籍）2) 走拼柜而非整柜（如果不急用）3) 减少带的物品（大陆能买到的日用品别带）4) 淡季搬家（避开春节前后和6-8月旺季）5) 选对计价方式（重货按重量、轻货按体积，提前咨询哪种划算）。</p></div>
    <div class="faq-item"><h3>搬家费可以开发票吗？</h3><p>可以。速豹集运提供正规发票（增值税普通发票），可用于公司外派搬家报销、个人报税等用途。</p></div>
